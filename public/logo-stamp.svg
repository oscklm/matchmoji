<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid-white stamp with eyes + mouth knocked out (transparent) so the
       card shows through. White = visible, black = hollow. -->
  <mask id="face">
    <rect x="6" y="6" width="88" height="88" rx="22" fill="#ffffff" />
    <circle cx="38" cy="42" r="7" fill="#000000" />
    <circle cx="62" cy="42" r="7" fill="#000000" />
    <path d="M32 60 q18 22 36 0" stroke="#000000" stroke-width="8" stroke-linecap="round" fill="none" />
  </mask>
  <rect x="6" y="6" width="88" height="88" rx="22" fill="#ffffff" mask="url(#face)" />
</svg>
